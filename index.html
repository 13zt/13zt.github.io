<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>给你的一封信</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="page page-home">
    <div class="page-texture" aria-hidden="true"></div>

    <header class="topbar">
      <a class="brand" href="index.html" aria-label="返回首页">给你的信</a>
      <nav class="steps" aria-label="页面进度">
        <span class="step is-active">首页</span>
        <span class="step">信封</span>
        <span class="step">终章</span>
      </nav>
    </header>

    <main class="home-layout">
      <section class="hero-copy">
        <p class="eyebrow">A small letter</p>
        <h1>有些话，想认真地交给你。</h1>
        <p class="lead">不是突然出现的浪漫，是一点点藏起来的心动，终于想被你看见。</p>
        <a class="primary-btn" href="letter.html">
          <span>打开这封信</span>
          <span aria-hidden="true">-></span>
        </a>
      </section>

      <section class="depth-stage" aria-label="信件预览">
        <div class="paper-sheet sheet-back"></div>
        <div class="paper-sheet sheet-mid"></div>
        <div class="paper-sheet sheet-front">
          <span class="mini-line"></span>
          <span class="mini-line short"></span>
          <span class="mini-line"></span>
        </div>
        <div class="stamp-mark" aria-hidden="true">
          <span>13</span>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
